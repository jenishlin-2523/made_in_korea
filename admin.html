<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYM | Admin Insights</title>
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="scanline"></div>
    <div class="admin-container">
        <header>
            <h1>Premiere Command</h1>
            <p style="opacity: 0.6; letter-spacing: 2px;">Guest List & Analytics</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="label">Total Guests</span>
                <span id="total-responses" class="value">0</span>
            </div>
            <div class="stat-card">
                <span class="label">Confirmed</span>
                <span id="confirmed-yes" class="value">0</span>
            </div>
            <div class="stat-card">
                <span class="label">Premiere Hits</span>
                <span id="regrets" class="value">0</span>
            </div>
        </div>

        <button class="refresh-btn" onclick="fetchResponses()">Sync Records</button>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Guest Name</th>
                        <th>Status</th>
                        <th>Selected Premiere</th>
                    </tr>
                </thead>
                <tbody id="responses-table-body">
                    <!-- Responses will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
